name: miguel_angel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test — Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1-mesa-glx libegl1-mesa libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils

      - name: Install auth module dependencies
        run: pip install -r requirements-auth.txt

      - name: Install test dependencies
        run: pip install pytest pytest-qt

      - name: Run auth module tests
        run: pytest tests/test_profile.py -v --tb=short

      - name: Run ruff linter
        run: |
          pip install ruff
          ruff check miguel_angel/ --ignore E501

      - name: Run mypy type checker
        run: |
          pip install mypy
          mypy miguel_angel/auth/ --ignore-missing-imports

  lint:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check . --ignore E501
      - run: ruff format --check .
